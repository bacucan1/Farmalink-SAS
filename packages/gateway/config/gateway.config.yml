http:
  port: 8080
admin:
  port: 9876
  host: localhost
apiEndpoints:
  api:
    host: '*'
    paths:
      - '/api/*'
serviceEndpoints:
  backend:
    url: 'http://localhost:3001'
policies:
  - proxy
pipelines:
  apiPipeline:
    apiEndpoints:
      - api
    policies:
      - proxy:
          - action:
              serviceEndpoint: backend
              changeOrigin: true