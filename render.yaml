# Render Blueprint - Farmalink
# Solo backend y gateway - el frontend va en Vercel
# Base de datos: Neon (PostgreSQL serverless)

services:
  # Backend API
  - type: web
    name: farmalink-backend
    env: node
    region: us-east-1
    plan: free
    rootDir: packages/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Configurar en Render con tu URL de Neon
      - key: JWT_SECRET
        generateValue: true

  # Gateway
  - type: web
    name: farmalink-gateway
    env: node
    region: us-east-1
    plan: free
    rootDir: packages/gateway
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        fromService:
          type: web
          name: farmalink-backend
          envVarKey: RENDER_EXTERNAL_URL
