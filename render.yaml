services:
  # Backend API
  - type: web
    name: farmalink-backend
    env: node
    region: oregon  # <--- Corregido
    plan: free
    rootDir: packages/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # Gateway
  - type: web
    name: farmalink-gateway
    env: node
    region: oregon  # <--- Corregido
    plan: free
    rootDir: packages/gateway
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        fromService:
          type: web
          name: farmalink-backend
          property: host # Nota: En 2026 'property: host' es más fiable para comunicación interna