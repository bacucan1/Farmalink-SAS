version: "3.9"

services:

  mongo:
    image: mongo:6
    container_name: farmalink-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - farmalink-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmalink-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/farmalink
    depends_on:
      - mongo
    networks:
      - farmalink-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: farmalink-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - farmalink-network

volumes:
  mongo_data:

networks:
  farmalink-network:
    driver: bridge